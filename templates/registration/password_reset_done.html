<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email envoyé — ONEE</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #021427 0%, #0a3a4a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: rgba(10, 50, 61, 0.85);
            border: 1px solid rgba(166, 186, 204, 0.2);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .icon {
            font-size: 56px;
            margin-bottom: 20px;
        }

        h2 {
            color: #53e0f3;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 14px;
        }

        p {
            color: #a6bacc;
            font-size: 14px;
            line-height: 1.7;
            margin-bottom: 10px;
        }

        .note {
            background: rgba(83, 224, 243, 0.06);
            border: 1px solid rgba(83, 224, 243, 0.15);
            border-radius: 10px;
            padding: 12px 16px;
            margin-top: 20px;
        }

        .note p {
            color: #a6bacc;
            font-size: 12px;
            margin: 0;
        }

        strong {
            color: #ffffff;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="icon">📧</div>
        <h2>Email envoyé !</h2>
        <p>
            Si un compte existe avec cette adresse email,
            vous recevrez un lien de réinitialisation dans quelques minutes.
        </p>
        <p>Vérifiez aussi votre dossier <strong>Spams</strong>.</p>
        <div class="note">
            <p>⏱ Le lien expire dans <strong>24 heures</strong>.</p>
        </div>
    </div>
</body>

</html>
