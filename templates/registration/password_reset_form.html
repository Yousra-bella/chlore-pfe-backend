<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réinitialisation du mot de passe — ONEE</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #021427 0%, #0a3a4a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: rgba(10, 50, 61, 0.85);
            border: 1px solid rgba(166, 186, 204, 0.2);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-badge {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: rgba(83, 224, 243, 0.1);
            border: 2px solid rgba(83, 224, 243, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 28px;
        }

        .logo h1 {
            color: #53e0f3;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .logo p {
            color: #a6bacc;
            font-size: 13px;
            margin-top: 6px;
        }

        .titre {
            color: #ffffff;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .sous {
            color: #a6bacc;
            font-size: 13px;
            line-height: 1.6;
            margin-bottom: 28px;
        }

        label {
            display: block;
            color: #a6bacc;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        input[type="email"] {
            width: 100%;
            padding: 14px 16px;
            background: rgba(2, 17, 34, 0.6);
            border: 1px solid rgba(166, 186, 204, 0.25);
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="email"]:focus {
            border-color: #53e0f3;
        }

        input[type="email"]::placeholder {
            color: rgba(166, 186, 204, 0.4);
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 15px;
            background: rgba(83, 224, 243, 0.6);
            border: none;
            border-radius: 14px;
            color: #021427;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
            letter-spacing: 0.3px;
        }

        button:hover {
            opacity: 0.85;
        }

        .back {
            text-align: center;
            margin-top: 20px;
        }

        .back a {
            color: #a6bacc;
            font-size: 13px;
            text-decoration: none;
        }

        .back a:hover {
            color: #53e0f3;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="logo">
            <div class="logo-badge">🔐</div>
            <h1>ONEE — BRANCHE EAU</h1>
            <p>Gestion des Tanks à Chlore</p>
        </div>
        <p class="titre">Mot de passe oublié ?</p>
        <p class="sous">
            Entrez l'adresse email associée à votre compte administrateur.
            Vous recevrez un lien pour réinitialiser votre mot de passe.
        </p>
        <form method="post">
            {% csrf_token %}
            <label for="id_email">Adresse email</label>
            <input type="email" id="id_email" name="email" placeholder="admin@onee.ma" required autofocus>
            <button type="submit">Envoyer le lien de réinitialisation</button>
        </form>
        <div class="back">
            <a href="/">← Retour à la connexion</a>
        </div>
    </div>
</body>

</html>
